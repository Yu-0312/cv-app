name: Career Ops Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: write

jobs:
  career-ops:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Career Ops job snapshot
        run: |
          if [ -f data/career-ops-source-strategy.json ]; then
            npm run career-ops:sources:build
          fi
          if [ -f data/career-ops-source-flex.json ]; then
            npm run career-ops:source-flex
          fi
          if [ ! -f data/career-ops-sources.json ]; then
            echo "data/career-ops-sources.json not found and no source strategy built it; skipping."
            exit 0
          fi
          npm run career-ops:scrape -- --include-expired
          npm run career-ops:quality
          if [ -f data/career-ops-profile.json ]; then
            npm run career-ops:evaluate -- --profile data/career-ops-profile.json
            npm run career-ops:intelligence -- --profile data/career-ops-profile.json
            npm run career-ops:application-kit -- --profile data/career-ops-profile.json
            npm run career-ops:deep-research -- --profile data/career-ops-profile.json
            npm run career-ops:compensation -- --profile data/career-ops-profile.json
            npm run career-ops:story-bank -- --profile data/career-ops-profile.json
            npm run career-ops:parallel -- --profile data/career-ops-profile.json
            npm run career-ops:deep-fit -- --profile data/career-ops-profile.json
            npm run career-ops:learn -- --profile data/career-ops-profile.json
            npm run career-ops:modes
          else
            npm run career-ops:intelligence
            npm run career-ops:application-kit
            npm run career-ops:deep-research
            npm run career-ops:compensation
            npm run career-ops:story-bank
            npm run career-ops:parallel
            npm run career-ops:deep-fit
            npm run career-ops:learn
            npm run career-ops:modes
          fi
      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/career-ops-sources.json data/app/career-ops-jobs.json data/app/career-ops-jobs.js data/app/career-ops-intelligence-report.md data/app/career-ops-source-strategy-report.md data/app/career-ops-source-flex-report.md data/app/career-ops-source-quality-report.md data/app/career-ops-application-kit.json data/app/career-ops-application-kit.js data/app/career-ops-application-kit.md data/app/career-ops-deep-research.json data/app/career-ops-deep-research.js data/app/career-ops-deep-research.md data/app/career-ops-deep-fit.json data/app/career-ops-deep-fit.js data/app/career-ops-deep-fit.md data/app/career-ops-compensation.json data/app/career-ops-compensation.js data/app/career-ops-compensation.md data/app/career-ops-story-bank.json data/app/career-ops-story-bank.js data/app/career-ops-story-bank.md data/app/career-ops-parallel-report.json data/app/career-ops-parallel-report.js data/app/career-ops-parallel-report.md data/app/career-ops-learning.json data/app/career-ops-learning.js data/app/career-ops-learning-report.md data/app/career-ops-modes.json data/app/career-ops-modes.js data/app/career-ops-modes-report.md; then
            echo "No Career Ops snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- data/career-ops-sources.json data/app/career-ops-jobs.json data/app/career-ops-jobs.js data/app/career-ops-intelligence-report.md data/app/career-ops-source-flex-report.md data/app/career-ops-source-quality-report.md data/app/career-ops-application-kit.json data/app/career-ops-application-kit.js data/app/career-ops-application-kit.md data/app/career-ops-deep-research.json data/app/career-ops-deep-research.js data/app/career-ops-deep-research.md data/app/career-ops-deep-fit.json data/app/career-ops-deep-fit.js data/app/career-ops-deep-fit.md data/app/career-ops-compensation.json data/app/career-ops-compensation.js data/app/career-ops-compensation.md data/app/career-ops-story-bank.json data/app/career-ops-story-bank.js data/app/career-ops-story-bank.md data/app/career-ops-parallel-report.json data/app/career-ops-parallel-report.js data/app/career-ops-parallel-report.md data/app/career-ops-learning.json data/app/career-ops-learning.js data/app/career-ops-learning-report.md data/app/career-ops-modes.json data/app/career-ops-modes.js data/app/career-ops-modes-report.md
          if [ -f data/app/career-ops-source-strategy-report.md ]; then
            git add data/app/career-ops-source-strategy-report.md
          fi
          git commit -m "Update Career Ops snapshot"
          git push
