name: Career Ops Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: write

jobs:
  career-ops:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install

      - name: Job health check (report expiry rate before scrape)
        run: |
          if [ -f data/app/career-ops-jobs.json ]; then
            node scripts/career-ops-health-monitor.mjs \
              --jobs data/app/career-ops-jobs.json \
              --out data/app/career-ops-job-health.json \
              --report-out data/app/career-ops-job-health-report.md \
              --threshold 0.30
          fi

      - name: Build sources and scrape jobs
        run: |
          if [ -f data/career-ops-source-strategy.json ]; then
            npm run career-ops:sources:build
          fi
          if [ -f data/career-ops-source-flex.json ]; then
            npm run career-ops:source-flex
          fi
          if [ ! -f data/career-ops-sources.json ]; then
            echo "data/career-ops-sources.json not found; skipping."
            exit 0
          fi
          npm run career-ops:scrape -- --include-expired
          npm run career-ops:quality

      - name: Run analysis pipeline
        run: |
          PROFILE_FLAG=""
          if [ -f data/career-ops-profile.json ]; then
            PROFILE_FLAG="--profile data/career-ops-profile.json"
          fi
          npm run career-ops:evaluate -- $PROFILE_FLAG
          npm run career-ops:intelligence -- $PROFILE_FLAG
          npm run career-ops:application-kit -- $PROFILE_FLAG
          npm run career-ops:deep-research -- $PROFILE_FLAG
          npm run career-ops:compensation -- $PROFILE_FLAG
          npm run career-ops:story-bank -- $PROFILE_FLAG
          npm run career-ops:parallel -- $PROFILE_FLAG
          # Deep fit: Layer A (25), Layer B (40), Layer C (30) = up to 95 results
          node scripts/career-ops-deep-fit.mjs $PROFILE_FLAG \
            --top-a 25 --top-b 40 --top-c 30 \
            --out data/app/career-ops-deep-fit.json \
            --js-out data/app/career-ops-deep-fit.js \
            --report-out data/app/career-ops-deep-fit.md
          npm run career-ops:learn -- $PROFILE_FLAG
          npm run career-ops:decision-report -- $PROFILE_FLAG
          npm run career-ops:modes

      - name: Post-scrape health check (update expiry stats)
        run: |
          node scripts/career-ops-health-monitor.mjs \
            --jobs data/app/career-ops-jobs.json \
            --out data/app/career-ops-job-health.json \
            --report-out data/app/career-ops-job-health-report.md \
            --threshold 0.30

      - name: Commit updated snapshot
        run: |
          CHANGED_FILES="data/career-ops-sources.json \
            data/app/career-ops-jobs.json data/app/career-ops-jobs.js \
            data/app/career-ops-intelligence-report.md \
            data/app/career-ops-source-strategy-report.md \
            data/app/career-ops-source-flex-report.md \
            data/app/career-ops-source-quality-report.md \
            data/app/career-ops-application-kit.json data/app/career-ops-application-kit.js data/app/career-ops-application-kit.md \
            data/app/career-ops-deep-research.json data/app/career-ops-deep-research.js data/app/career-ops-deep-research.md \
            data/app/career-ops-deep-fit.json data/app/career-ops-deep-fit.js data/app/career-ops-deep-fit.md \
            data/app/career-ops-compensation.json data/app/career-ops-compensation.js data/app/career-ops-compensation.md \
            data/app/career-ops-story-bank.json data/app/career-ops-story-bank.js data/app/career-ops-story-bank.md \
            data/app/career-ops-parallel-report.json data/app/career-ops-parallel-report.js data/app/career-ops-parallel-report.md \
            data/app/career-ops-learning.json data/app/career-ops-learning.js data/app/career-ops-learning-report.md \
            data/app/career-ops-decision-report.json data/app/career-ops-decision-report.js data/app/career-ops-decision-report.md \
            data/app/career-ops-modes.json data/app/career-ops-modes.js data/app/career-ops-modes-report.md \
            data/app/career-ops-job-health.json data/app/career-ops-job-health-report.md"
          if git diff --quiet -- $CHANGED_FILES; then
            echo "No Career Ops snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- $CHANGED_FILES
          if [ -f data/app/career-ops-source-strategy-report.md ]; then
            git add data/app/career-ops-source-strategy-report.md
          fi
          git commit -m "Update Career Ops snapshot"
          git push
