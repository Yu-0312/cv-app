# Supabase project configuration
# See: https://supabase.com/docs/guides/local-development/cli/config

project_id = "cv-app"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8790"
additional_redirect_urls = ["https://your-project.github.io"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.external.google]
enabled = false
# Set SUPABASE_AUTH_GOOGLE_CLIENT_ID and SUPABASE_AUTH_GOOGLE_SECRET in .env

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[[analytics]]
enabled = false
